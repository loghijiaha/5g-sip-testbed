#!KAMAILIO

debug=3
log_stderror=yes
children=4
auto_aliases=no
listen=udp:127.0.0.1:5060

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "rtpengine.so"

modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("usrloc", "db_mode", 0)
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

request_route {
    xlog("L_INFO", "[$ci] $rm from $fu to $ru\n");

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (is_method("INVITE|SUBSCRIBE")) { record_route(); }

    if (has_totag()) {
        if (loose_route()) {
            if (is_method("INVITE")) {
                rtpengine_manage("replace-origin replace-session-connection");
            }
            if (is_method("BYE")) { rtpengine_delete(); }
            route(RELAY);
            exit;
        }
    }

    if (is_method("CANCEL")) {
        if (t_check_trans()) { route(RELAY); }
        exit;
    }

    t_check_trans();

    if (is_method("REGISTER")) {
        if (!save("location")) { sl_send_reply("500", "Error"); }
        xlog("L_INFO", "=== REGISTER OK: $fu ===\n");
        exit;
    }

    if (is_method("INVITE")) {
        rtpengine_manage("replace-origin replace-session-connection");
        if (!lookup("location")) {
            sl_send_reply("404", "Not Found");
            exit;
        }
        route(RELAY);
        exit;
    }

    if (is_method("BYE")) {
        rtpengine_delete();
        route(RELAY);
        exit;
    }

    if (!lookup("location")) {
        sl_send_reply("404", "Not Found");
        exit;
    }
    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) { sl_send_reply("500", "Relay Error"); }
    exit;
}

onreply_route {
    if (is_method("INVITE") && status=~"[12][0-9][0-9]") {
        rtpengine_manage("replace-origin replace-session-connection");
    }
}
